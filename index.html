<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Hollow Knight | Offline</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #unity-container { width: 100vw; height: 100vh; position: relative; }
        #unity-canvas { width: 100%; height: 100%; background: #000; }
        #loading-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10;
        }
        #progress-bar-empty { width: 300px; height: 18px; background: #222; border-radius: 10px; border: 1px solid #444; margin-top: 20px; overflow: hidden; }
        #progress-bar-full { width: 0%; height: 100%; background: #fff; transition: width 0.1s; }
        #status-text { margin-top: 10px; font-size: 14px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="loading-overlay">
            <div id="loading-title" style="font-size: 24px;">Hollow Knight</div>
            <div id="progress-bar-empty"><div id="progress-bar-full"></div></div>
            <div id="status-text">Waking up Service Worker...</div>
        </div>
    </div>

    <script>
        const canvas = document.querySelector("#unity-canvas");
        const progressBarFull = document.querySelector("#progress-bar-full");
        const statusText = document.querySelector("#status-text");
        const overlay = document.querySelector("#loading-overlay");

        const CONFIG = {
            dataParts: 45, // 00 to 44
            wasmParts: 2,  // 00 to 01
            prefix: "hktruffled",
            buildUrl: "Build"
        };

        async function fetchBinary(type, total) {
            const blobs = [];
            for (let i = 0; i < total; i++) {
                const partId = i.toString().padStart(2, '0');
                const url = `./${CONFIG.buildUrl}/${CONFIG.prefix}.${type}.part${partId}`;
                
                const resp = await fetch(url);
                if (!resp.ok) break;
                
                blobs.push(await resp.blob());
                statusText.textContent = `Loading ${type}: ${Math.round((i/total)*100)}%`;
                progressBarFull.style.width = Math.round(((i/total)*50)) + (type === "data" ? 50 : 0) + "%";
            }
            return URL.createObjectURL(new Blob(blobs));
        }

        async function init() {
            if (!('serviceWorker' in navigator)) {
                statusText.textContent = "Browser too old for offline mode.";
                return;
            }

            try {
                // Wait for SW to be ready
                const reg = await navigator.serviceWorker.register('./sw.js');
                await navigator.serviceWorker.ready;
                
                // If it's the first visit, we might need to reload once SW takes control
                if (!navigator.serviceWorker.controller) {
                    window.location.reload();
                    return;
                }

                const wasmUrl = await fetchBinary("wasm", CONFIG.wasmParts);
                const dataUrl = await fetchBinary("data", CONFIG.dataParts);

                statusText.textContent = "Starting Unity Engine...";
                
                const script = document.createElement("script");
                script.src = `./${CONFIG.buildUrl}/${CONFIG.prefix}.loader.js`;
                script.onload = () => {
                    createUnityInstance(canvas, {
                        dataUrl: dataUrl,
                        frameworkUrl: `./${CONFIG.buildUrl}/${CONFIG.prefix}.framework.js`,
                        codeUrl: wasmUrl,
                        streamingAssetsUrl: "StreamingAssets",
                        companyName: "Team Cherry",
                        productName: "Hollow Knight",
                        productVersion: "1.0",
                        dataCaching: false, 
                    }, (progress) => {
                        // Unity's internal progress
                        statusText.textContent = `Starting engine: ${Math.round(progress * 100)}%`;
                    }).then(() => {
                        overlay.style.display = "none";
                    }).catch(alert);
                };
                document.body.appendChild(script);

            } catch (err) {
                statusText.textContent = "Offline error: " + err.message;
            }
        }

        init();
    </script>
</body>
</html>
